name: Check DB Days

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Count days
        run: |
          python -c "
import sqlite3
conn = sqlite3.connect('data/iv_history.db')
count = conn.execute('SELECT COUNT(DISTINCT date) FROM daily_iv').fetchone()[0]
print(f'✅ Total distinct trading days: {count}')
conn.close()
"