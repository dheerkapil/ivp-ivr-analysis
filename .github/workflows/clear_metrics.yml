name: Clear Today's Metrics

on:
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete today's metrics
        run: |
          python -c "import sqlite3; from datetime import datetime; conn = sqlite3.connect('data/iv_history.db'); cursor = conn.cursor(); today = datetime.now().strftime('%Y-%m-%d'); cursor.execute('DELETE FROM daily_metrics WHERE date = ?', (today,)); conn.commit(); deleted = cursor.rowcount; conn.close(); print(f'Deleted {deleted} rows for {today}')"

      - name: Commit deletion
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f data/iv_history.db
          git commit -m "Clear cached metrics for today" || echo "No changes"
          git push