name: Daily IVP/IVR Update

on:
  schedule:
    - cron: '00 13 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '00 14 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '00 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '00 16 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '00 17 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '00 18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check DB days
        run: |
          python -c "import sqlite3; conn = sqlite3.connect('data/iv_history.db'); count = conn.execute('SELECT COUNT(DISTINCT date) FROM daily_iv').fetchone()[0]; print(f'Days in daily_iv: {count}'); conn.close()"

      - name: Create data and output directories
        run: |
          mkdir -p data
          mkdir -p output

      - name: Run main analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit and push results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/daily_ivp_ivr.json
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push