name: Daily IVP/IVR Update

on:
  schedule:
    # Runs at 1:00 PM UTC (6:30 PM IST) on weekdays
    - cron: '00 13 * * 1-5'
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Debug nselib
      run: |
        echo "=== Checking nselib ==="
        python -c "import nselib; print('nselib attributes:', [x for x in dir(nselib) if not x.startswith('_')])"
        echo ""
        echo "=== Checking nselib.capital_market ==="
        python -c "from nselib import capital_market; print('capital_market attributes:', [x for x in dir(capital_market) if not x.startswith('_')])"
        echo ""
        echo "=== Checking for bhavcopy functions ==="
        python -c "
import nselib
from nselib import capital_market
# Check all modules
for module_name in ['nselib', 'nselib.capital_market']:
    try:
        module = eval(module_name)
        print(f'{module_name}:')
        for attr in dir(module):
            if 'bhav' in attr.lower() or 'fno' in attr.lower() or 'copy' in attr.lower():
                print(f'  - {attr}')
    except:
        pass
"
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Run main analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python src/main.py
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f "output/daily_ivp_ivr.json" ]; then
          git add output/daily_ivp_ivr.json
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
        else
          echo "No output file to commit"
        fi
