name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of recent trading days to backfill'
        required: true
        default: '10'
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backfill
        run: python scripts/backfill.py --days ${{ github.event.inputs.days }}
      - name: Commit and push database
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f data/iv_history.db
          git commit -m "Backfill historical IV data (${{ github.event.inputs.days }} days)" || echo "No changes to commit"
          git push
