name: Reset and Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of trading days'
        required: true
        default: '365'

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old database
        run: |
          rm -f data/iv_history.db
          git add data/iv_history.db
          git commit -m "Remove old database" || echo "Nothing to remove"
          git push || echo "Nothing to push"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill
        run: python scripts/backfill.py --days ${{ github.event.inputs.days }}

      - name: Verify day count
        run: |
          python -c "
import sqlite3
conn = sqlite3.connect('data/iv_history.db')
count = conn.execute('SELECT COUNT(DISTINCT date) FROM daily_iv').fetchone()[0]
print(f'Days in database: {count}')
if count < 253:
    print('ERROR: Less than 253 days')
    exit(1)
conn.close()
"

      - name: Commit and push database
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase origin main
          git add -f data/iv_history.db
          git commit -m "Fresh backfill (${{ github.event.inputs.days }} days)" || echo "No changes"
          git push